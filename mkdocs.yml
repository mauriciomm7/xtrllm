site_name: xtrllm
docs_dir: docs

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.ico
  font:
    text: Source Sans Pro
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.left
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight


markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - admonition
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.details

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Advanced Usage: advancedusage.md
  - 🎣 Xtractors:
    - eulexdb: tools/eulexdb.md
    - uot25rev: tools/uot25rev.md

extra_css:
  - stylesheets/overrides.css
  - stylesheets/extra.css

plugins:
  - search

copyright: >
  Copyright &copy; 2016 - 2025 Mauricio M. M. –
  <a href="#__consent">Change cookie settings</a>
